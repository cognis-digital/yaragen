name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install pytest
      - name: Test
        shell: bash
        run: |
          if compgen -G "tests/*.py" > /dev/null; then
            python -m pytest -q
          else
            echo "no tests present — skipping"
          fi
